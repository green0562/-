<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参加カレンダー</title>

<style>
body { font-family: sans-serif; margin: 10px; }

.top-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.controls {
  text-align: center;
  margin: 10px;
}

button { padding: 5px 10px; }

.day-row {
  display: flex;
  border-bottom: 1px solid #ccc;
  padding: 6px;
  align-items: center;
}

.date { width: 100px; font-weight: bold; }
.names { flex: 1; }

.name-tag {
  padding: 3px 8px;
  margin: 2px;
  display: inline-block;
  border-radius: 6px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.add-btn {
  width: 80px;
  text-align: right;
  color: blue;
  cursor: pointer;
}

.sat { background: #d9f0ff; }
.sun { background: #ffd9d9; }
.holiday { background: #ffe4e4; color: red; }
</style>

</head>

<body>

<div class="top-bar">
  <button onclick="moveMonth(-2)">◀</button>
  <h2 id="title"></h2>
  <button onclick="moveMonth(2)">▶</button>
</div>

<div class="controls">
  <button onclick="editTitle()">タイトル編集</button>
  <button onclick="clearAll()">管理者：全削除</button>
</div>

<div id="calendar"></div>

<script>

let myName = localStorage.getItem("myName") || "";
let titleText = localStorage.getItem("title") || "参加カレンダー";
let data = JSON.parse(localStorage.getItem("calendarData") || "{}");

const ADMIN_PASS = "1234";

let nameColors = JSON.parse(localStorage.getItem("nameColors") || "{}");

const colors = ["#e74c3c","#3498db","#2ecc71","#9b59b6","#f39c12","#1abc9c"];

function getColor(name) {
  if (!nameColors[name]) {
    nameColors[name] = colors[Object.keys(nameColors).length % colors.length];
    localStorage.setItem("nameColors", JSON.stringify(nameColors));
  }
  return nameColors[name];
}

let current = new Date();
current.setDate(1);

function moveMonth(n) {
  current.setMonth(current.getMonth() + n);
  render();
}

function editTitle() {
  const t = prompt("タイトル", titleText);
  if (t) {
    titleText = t;
    localStorage.setItem("title", t);
    render();
  }
}

function clearAll() {
  const pass = prompt("パスワード");
  if (pass !== ADMIN_PASS) return alert("違います");
  if (!confirm("全削除しますか？")) return;

  data = {};
  localStorage.setItem("calendarData", JSON.stringify(data));
  render();
}

function render() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const y = current.getFullYear();
  const m = current.getMonth();

  document.getElementById("title").textContent =
    `${titleText}（${y}年 ${m+1}月〜${m+2}月）`;

  createMonth(y, m);
  createMonth(y, m+1);
}

function createMonth(year, month) {
  const last = new Date(year, month+1, 0).getDate();

  for (let d=1; d<=last; d++) {
    const key = `${year}-${month+1}-${d}`;
    const day = new Date(year, month, d).getDay();

    const row = document.createElement("div");
    row.className = "day-row";
    if (day===0) row.classList.add("sun");
    if (day===6) row.classList.add("sat");

    const date = document.createElement("div");
    date.className = "date";
    date.textContent = `${month+1}/${d}`;
    row.appendChild(date);

    const names = document.createElement("div");
    names.className = "names";

    (data[key]||[]).forEach(name=>{
      const span = document.createElement("span");
      span.className = "name-tag";
      span.textContent = name;
      span.style.backgroundColor = getColor(name);

      span.onclick = ()=>{
      span.onclick = ()=>{
  const input = prompt("消す名前を入力してください");

  if (!input) return;

  if (input !== name) {
    alert("名前が一致しません");
    return;
  }

  if (!confirm(name + " を削除しますか？")) return;

  data[key] = data[key].filter(n => n !== name);
  save();
};

      names.appendChild(span);
    });

    row.appendChild(names);

    const btn = document.createElement("div");
    btn.className = "add-btn";
    btn.textContent = "+参加";

    btn.onclick = ()=>{
      if (!myName) {
        myName = prompt("名前入力");
        localStorage.setItem("myName", myName);
      }
      data[key] = data[key] || [];
      if (!data[key].includes(myName)) data[key].push(myName);
      save();
    };

    row.appendChild(btn);
    document.getElementById("calendar").appendChild(row);
  }
}

function save() {
  localStorage.setItem("calendarData", JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
