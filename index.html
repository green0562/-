<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参加カレンダー</title>

<style>
body { font-family: sans-serif; margin: 10px; }
.day-row { display:flex; border-bottom:1px solid #ccc; padding:5px; }
.date { width:80px; }
.name-tag { margin:2px; padding:2px 6px; border-radius:4px; color:#fff; cursor:pointer; }
.add-btn { margin-left:auto; color:blue; cursor:pointer; }
</style>
</head>

<body>

<h2 id="title"></h2>
<div id="calendar"></div>

<script>

let data = JSON.parse(localStorage.getItem("data")||"{}");
let colors = {};
const palette = ["red","blue","green","orange","purple"];

function getColor(name){
 if(!colors[name]){
   colors[name] = palette[Object.keys(colors).length % palette.length];
 }
 return colors[name];
}

function render(){
 const cal = document.getElementById("calendar");
 cal.innerHTML = "";
 document.getElementById("title").textContent="参加カレンダー";

 for(let d=1; d<=31; d++){
   const key = "2026-1-"+d;

   const row = document.createElement("div");
   row.className="day-row";

   const date = document.createElement("div");
   date.className="date";
   date.textContent="1/"+d;
   row.appendChild(date);

   const names = document.createElement("div");

   (data[key]||[]).forEach(name=>{
     const span = document.createElement("span");
     span.className="name-tag";
     span.textContent=name;
     span.style.background=getColor(name);

     span.onclick=()=>{
       const input = prompt("消す名前を入力してください");
       if(input!==name){
         alert("一致しません");
         return;
       }
       data[key]=data[key].filter(n=>n!==name);
       save();
     };

     names.appendChild(span);
   });

   row.appendChild(names);

   const btn=document.createElement("div");
   btn.className="add-btn";
   btn.textContent="+参加";
   btn.onclick=()=>{
     const name=prompt("名前入力");
     if(!name)return;
     data[key]=data[key]||[];
     data[key].push(name);
     save();
   };

   row.appendChild(btn);
   cal.appendChild(row);
 }
}

function save(){
 localStorage.setItem("data",JSON.stringify(data));
 render();
}

render();

</script>

</body>
</html>
